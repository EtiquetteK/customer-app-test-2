name: CI/CD Pipeline for Customers App

on:
  push:
    branches:
      - main   # i. Trigger: run pipeline when pushing to main branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-source

      - name: Lint PHP files
        run: find . -type f -name "*.php" -exec php -l {} \;

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-source
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit tests/ --testdox

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'customers-app'
          path: '.'
          format: 'HTML'
          out: 'reports'

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v3

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Authenticate with Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: echo "$HEROKU_API_KEY" | heroku auth:token >/dev/null

      - name: Deploy to Green environment
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku git:remote -a customers-green
          git push heroku main

      - name: Smoke test Green deployment
        run: curl -f https://customers-green.herokuapp.com/customers.php

      - name: Promote Green to Production (Blue-Green switch)
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku pipelines:promote --app customers-green
