name: CI/CD Pipeline for Customers App

on:
  push:
    branches:
      - main   # i. Trigger: run pipeline when pushing to main branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'  # Match Heroku's PHP version (8.5.5 not available in actions)
          extensions: mbstring, pdo_mysql, pdo_pgsql

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-source

      - name: Lint PHP files
        run: find . -type f -name "*.php" -exec php -l {} \;

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'  # Match Heroku's PHP version
          extensions: mbstring, pdo_mysql, pdo_pgsql
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-source
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit tests/ --testdox

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'customers-app'
          path: '.'
          format: 'HTML'
          out: 'reports'

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Green environment
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo "🚀 Starting deployment to Heroku..."
          git remote add heroku https://heroku:${HEROKU_API_KEY}@git.heroku.com/customers-green.git || echo "Remote already exists"
          git push heroku main
          echo "✅ Deployment completed successfully"

      - name: Smoke test Green deployment
        run: curl -f https://customers-green-211c4ebbf814.herokuapp.com/customers.php

      - name: Verify deployment success
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 App URL: https://customers-green-211c4ebbf814.herokuapp.com/"
          echo "📊 Check that customer records are displaying correctly"
